<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6f5b" />
    <meta name="description" content="Lista de la compra visual conectada a Supabase." />
    <title>Lista de la compra</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./category-catalog.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Compra rápida</p>
          <h1>Lista de la compra</h1>
        </div>
        <button class="icon-button" id="refreshButton" type="button" aria-label="Actualizar lista">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <section class="composer" aria-label="Añadir producto">
        <form id="itemForm" autocomplete="off">
          <label class="field-label" for="itemInput">Producto</label>
          <div class="input-row">
            <input id="itemInput" name="item" type="text" placeholder="Leche, tomates, pan..." required />
            <button type="submit">Añadir</button>
          </div>

          <div class="category-picker">
            <label class="field-label" for="categorySelect">Categoría detectada</label>
            <select id="categorySelect" name="category"></select>
          </div>
        </form>
      </section>

      <section class="status-line" aria-live="polite">
        <span id="pendingCount">Cargando...</span>
        <span id="connectionState">Conectando</span>
      </section>

      <section class="aisle-strip" id="aisleStrip" aria-label="Resumen por categoría"></section>

      <section class="route-board" id="routeBoard" aria-label="Productos por categoría"></section>

      <div class="empty-state" id="emptyState" hidden>
        <strong>Lista despejada</strong>
        <span>Añade algo desde aquí o pídeselo a Alexa.</span>
      </div>
    </main>
  </body>
</html>
